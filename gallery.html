<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Gryzlock Comics</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <h1>Gryzlock Comics</h1>
                </a>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="gallery.html" class="nav-link active">Gallery</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="merch.html" class="nav-link">Merch</a>
                <a href="tips.html" class="nav-link">Support</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="gallery-section">
            <h2>Gallery</h2>
            <div class="gallery-grid" id="gallery-grid">
                <!-- Gallery items generated by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Gryzlock Comics. All rights reserved.</p>
            <a href="https://www.instagram.com/gryzlock_comics/" target="_blank" class="social-link" title="Instagram">
                <span class="instagram-icon">📷</span>
            </a>
        </div>
    </footer>

    <script>
        async function loadGallery() {
            try {
                const response = await fetch('comics.json?v=2');
                const comics = await response.json();
                const grid = document.getElementById('gallery-grid');

                // Show comics in reverse order (newest first)
                const sorted = [...comics].reverse();

                sorted.forEach(comic => {
                    const firstPanel = comic.panels && comic.panels.length > 0 ? comic.panels[0] : comic.coverUrl;
                    const item = document.createElement('a');
                    item.href = 'index.html#comic-' + comic.id;
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <img src="${firstPanel}" alt="${comic.title}" loading="lazy">
                        <div class="gallery-item-info">
                            <h3>${comic.title}</h3>
                        </div>
                    `;
                    grid.appendChild(item);
                });
            } catch (e) {
                console.error('Error loading gallery:', e);
            }
        }
        loadGallery();
    </script>
</body>
</html>
