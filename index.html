<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gryzlock Comics</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css?v=11">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <h1>Gryzlock Comics</h1>
                </a>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="gallery.html" class="nav-link">Gallery</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="merch.html" class="nav-link">Merch</a>
                <a href="tips.html" class="nav-link">Support</a>
            </nav>
        </div>
    </header>

    <section class="latest-banner">
        <div class="latest-banner-content">
            <div class="latest-banner-label">
                <span class="latest-label-big">LATEST</span>
                <span class="latest-label-big">COMICS</span>
            </div>
            <div class="latest-banner-cards" id="latest-banner-cards">
                <!-- Filled by JS -->
            </div>
        </div>
    </section>

    <main class="container">
        <section class="comic-viewer">
            <div class="comic-display">
                <div class="comic-header">
                    <h2 id="comic-title">Loading...</h2>
                    <p id="comic-date" class="comic-date">-</p>
                </div>
                <div id="comic-panels" class="comic-panels">
                    <!-- Panels injected by JS -->
                </div>
                <p id="comic-description" class="comic-description">-</p>
            </div>

            <div class="comic-navigation">
                <button id="btn-first" class="nav-btn" title="First comic">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="5" width="3" height="14"></rect><polygon points="21 5 10 12 21 19"></polygon></svg>
                </button>
                <button id="btn-prev" class="nav-btn" title="Previous comic">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="20 5 7 12 20 19"></polygon></svg>
                </button>
                <span class="comic-counter">
                    <span id="current-index">1</span> / <span id="total-count">-</span>
                </span>
                <button id="btn-next" class="nav-btn" title="Next comic">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="4 5 17 12 4 19"></polygon></svg>
                </button>
                <button id="btn-last" class="nav-btn" title="Latest comic">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="3 5 14 12 3 19"></polygon><rect x="18" y="5" width="3" height="14"></rect></svg>
                </button>
            </div>

            <div class="random-section">
                <button id="btn-random" class="btn-random" title="Random comic">
                    Random Comic
                </button>
            </div>

            <div class="share-bar">
                <button id="btn-share" class="share-btn" title="Share this comic">
                    <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    <span>Share</span>
                </button>
                <div id="share-popup" class="share-popup" hidden>
                    <button id="btn-share-close" class="share-popup-close" title="Close" aria-label="Close">&times;</button>
                    <div class="share-popup-buttons">
                        <button id="btn-share-x" class="share-popup-btn share-x-btn" title="Tweet">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                            <span>Tweet</span>
                        </button>
                        <button id="btn-share-fb" class="share-popup-btn share-fb-btn" title="Share on Facebook">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"/></svg>
                            <span>Share</span>
                        </button>
                    </div>
                    <div class="share-permalink-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                        <span>PERMALINK</span>
                    </div>
                    <a id="share-permalink" class="share-permalink" href="#"></a>
                </div>
                <span id="share-feedback" class="share-feedback"></span>
            </div>
        </section>

        <section class="recent-comics">
            <h2>Recent Comics</h2>
            <div class="comics-grid" id="comics-grid">
                <!-- Comics grid generated by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Gryzlock Comics. All rights reserved.</p>
            <a href="https://www.instagram.com/gryzlock_comics/" target="_blank" class="social-link" title="Instagram">
                <span class="instagram-icon">ð·</span>
            </a>
        </div>
    </footer>

    <script src="script.js?v=11"></script>
</body>
</html>
